    <style>
        body {
            font-family: 'Archivo Black', sans-serif;
            background-color: #020617;
            color: #f0fdf4;
            margin: 0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(5, 46, 22, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .phonk-text {
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.8), 0 0 15px rgba(234, 179, 8, 0.4);
            letter-spacing: -0.05em;
        }
        .glitch-bg {
          background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(34, 197, 94, 0.05), rgba(234, 179, 8, 0.02), rgba(59, 130, 246, 0.05));
          background-size: 100% 2px, 3px 100%;
          pointer-events: none;
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 200;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(34, 197, 94, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
        @keyframes float {
          0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
          33% { transform: translateY(-20px) translateX(10px) rotate(2deg); }
          66% { transform: translateY(10px) translateX(-10px) rotate(-2deg); }
          100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
        }
        .animate-float {
          animation: float 10s ease-in-out infinite;
        }
        .particle {
          position: absolute;
          background: white;
          border-radius: 50%;
          opacity: 0.1;
          pointer-events: none;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #166534; }
        ::-webkit-scrollbar-thumb:hover { background: #15803d; }
    </style>
